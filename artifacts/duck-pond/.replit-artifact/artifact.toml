kind = "web"
previewPath = "/"
title = "Duck Pond"
version = "1.0.0"
id = "artifacts/duck-pond"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20163

[services.development]
run = "pnpm --filter @workspace/duck-pond run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/duck-pond", "run", "build" ]
publicDir = "artifacts/duck-pond/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20163"
BASE_PATH = "/"
